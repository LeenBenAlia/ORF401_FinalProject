# Publishes the React build to the `gh-pages` branch. After the first successful run:
#   GitHub → Settings → Pages → Build: "Deploy from a branch"
#   Branch: gh-pages  /  folder: / (root)
# Site URL: https://<user>.github.io/<repo>/
# (for this repo: https://LeenBenAlia.github.io/ORF401_FinalProject/)
#
# If your repository name is not ORF401_FinalProject, change PUBLIC_URL below to /YourRepoName
#
# Run manually from Actions when you want a GitHub Pages build. Day-to-day dev uses localhost
# (see frontend/.env.development — PORT=3001, PUBLIC_URL root for Heroku-style hosts).
name: Deploy frontend to GitHub Pages
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build React app
        working-directory: frontend
        env:
          CI: false
          PUBLIC_URL: /ORF401_FinalProject
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Copy index to 404 for client-side routes (SPA on GitHub Pages)
        run: cp frontend/build/index.html frontend/build/404.html

      - name: Push build to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
