# Deploys the React app to GitHub Pages using the official Actions workflow.
#
# ONE-TIME SETUP (required or you will see "there isn't a GitHub Pages site"):
#   1. Repo → Settings → Pages
#   2. Under "Build and deployment" → Source: choose "GitHub Actions"
#   3. After a green run: https://LeenBenAlia.github.io/ORF401_FinalProject/
#
# If you rename the repository, update PUBLIC_URL below to /YourNewRepoName
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build React app
        working-directory: frontend
        env:
          CI: false
          PUBLIC_URL: /ORF401_FinalProject
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Copy index to 404 for client-side routes (SPA on GitHub Pages)
        run: cp frontend/build/index.html frontend/build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
